<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技書閣 · 才能專校</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', 'Orbitron', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0b1a2e, #030812);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* 主視窗 -- 科技玻璃效果 */
        .holo-panel {
            width: 100%;
            max-width: 900px;
            height: 80vh;
            min-height: 600px;
            background: rgba(8, 20, 36, 0.75);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 42px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 30px rgba(0, 255, 255, 0.1);
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        /* 畫面切換容器 */
        .view {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #bbf0ff;
        }

        .hidden-view {
            display: none !important;
        }

        /* ========== 書架畫面 ========== */
        .shelf-header {
            padding: 16px 8px 8px;
            border-bottom: 1px solid #00ffff33;
            text-shadow: 0 0 8px cyan;
            letter-spacing: 2px;
            font-weight: 400;
            font-size: 1.8rem;
        }

        .shelf-grid {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            padding: 32px 16px;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #00aaff #001822;
        }

        .shelf-grid::-webkit-scrollbar {
            width: 8px;
        }
        .shelf-grid::-webkit-scrollbar-track {
            background: #001822;
            border-radius: 20px;
        }
        .shelf-grid::-webkit-scrollbar-thumb {
            background: #0cf;
            border-radius: 20px;
            box-shadow: inset 0 0 6px #00e0ff;
        }

        /* 科技卡片 -- 只有一本書 */
        .story-card {
            width: 260px;
            background: rgba(0, 30, 50, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #0cf3;
            border-radius: 32px;
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 20px #00b8ff33;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .story-card:hover {
            border-color: #0cf;
            box-shadow: 0 0 35px cyan, inset 0 0 20px #00aaff40;
            transform: translateY(-4px) scale(1.02);
            background: rgba(0, 50, 70, 0.8);
        }

        .story-icon {
            font-size: 64px;
            filter: drop-shadow(0 0 12px cyan);
            line-height: 1;
        }

        .story-title {
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: 4px;
            text-shadow: 0 0 15px cyan;
        }

        .story-sub {
            color: #9fc;
            font-size: 1rem;
            opacity: 0.8;
            border-top: 1px dashed #0cf5;
            padding-top: 12px;
        }

        /* ========== 閱讀器畫面 ========== */
        .reader-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 8px 16px;
            border-bottom: 1px solid #0cf3;
            flex-wrap: wrap;
        }

        .back-btn {
            background: transparent;
            border: 1px solid #0cf7;
            color: #0cf;
            font-size: 2rem;
            line-height: 1;
            width: 50px;
            height: 50px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 12px #0cf5;
        }
        .back-btn:hover {
            background: #0cf3;
            border-color: cyan;
            box-shadow: 0 0 30px cyan;
            transform: scale(1.05);
        }

        .reader-title-area {
            flex: 1;
        }
        .reader-title {
            font-size: 2.2rem;
            font-weight: 300;
            text-shadow: 0 0 12px #0cf;
            letter-spacing: 2px;
        }
        .reader-author {
            font-size: 1.1rem;
            color: #aaffee;
            text-shadow: 0 0 8px #0cf;
            opacity: 0.9;
        }

        .author-tool-btn {
            background: #0cf1;
            border: 1px solid #f0f;
            color: #f0f;
            font-size: 1.8rem;
            padding: 8px 16px;
            border-radius: 60px;
            box-shadow: 0 0 18px #f0f7, inset 0 0 8px #f0f5;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }
        .author-tool-btn:hover {
            background: #f0f3;
            border-color: cyan;
            color: white;
            box-shadow: 0 0 30px magenta;
        }

        /* 小說內容區域 */
        .reader-content {
            flex: 1;
            overflow-y: auto;
            padding: 28px 20px;
            font-size: 1.3rem;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
            text-align: justify;
            background: #02131e30;
            border-radius: 28px;
            margin: 16px 0;
            border: 1px solid #0cf2;
            box-shadow: inset 0 0 50px #001a29, 0 0 20px #00ccff1a;
            scrollbar-color: #f0f #001a2f;
            scrollbar-width: thin;
        }
        .reader-content::-webkit-scrollbar {
            width: 8px;
        }
        .reader-content::-webkit-scrollbar-track {
            background: #001a2f;
            border-radius: 20px;
        }
        .reader-content::-webkit-scrollbar-thumb {
            background: #f0f;
            border-radius: 20px;
            box-shadow: 0 0 16px magenta;
        }

        /* 編輯面板 -- 科技浮層 */
        .edit-panel {
            background: rgba(4, 15, 30, 0.95);
            backdrop-filter: blur(18px);
            border: 2px solid #f0f;
            border-radius: 36px;
            padding: 24px;
            margin-top: 16px;
            box-shadow: 0 0 60px magenta, inset 0 0 20px #0cf;
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .edit-panel.show-panel {
            display: flex;
        }

        .edit-textarea {
            background: #021a26;
            border: 1px solid #0cf;
            border-radius: 24px;
            padding: 24px;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #cffff0;
            resize: vertical;
            min-height: 220px;
            font-family: 'Roboto Mono', monospace;
            box-shadow: inset 0 0 30px #001d2d, 0 0 20px cyan;
            outline: none;
        }

        .edit-actions {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .neo-btn {
            background: transparent;
            border: 1px solid #0cf7;
            color: #0cf;
            padding: 12px 28px;
            font-size: 1.3rem;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: 0.15s;
            box-shadow: 0 0 12px cyan;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .neo-btn.magenta {
            border-color: #f0f;
            color: #f0f;
            box-shadow: 0 0 18px magenta;
        }
        .neo-btn.magenta:hover {
            background: #f0f3;
            border-color: white;
            color: white;
            box-shadow: 0 0 40px #ff66ff;
        }
        .neo-btn:hover {
            background: #0cf3;
            border-color: white;
            color: white;
            box-shadow: 0 0 40px cyan;
        }

        /* 密碼輸入提示用（無額外UI） */
        .footnote {
            color: #6af;
            font-size: 0.9rem;
            text-align: right;
            border-top: 1px dashed #f0f6;
            padding-top: 8px;
        }
    </style>
</head>
<body>
<div class="holo-panel" id="app">

    <!-- 書架畫面 (view 1) -->
    <div id="bookcase-view" class="view">
        <div class="shelf-header">📡 小說資料庫</div>
        <div class="shelf-grid">
            <!-- 只有一部小說：《才能專校》 -->
            <div class="story-card" id="open-story-btn">
                <span class="story-icon">📘</span>
                <span class="story-title">才能專校</span>
                <span class="story-sub">點擊進入 · 作者Yun7044</span>
            </div>
            <!-- 預留科技感裝飾線條 -->
        </div>
        <div style="text-align: right; color: #0cf5; padding: 8px; font-size: 1rem; border-top: 1px solid #0cf3;">🔒 唯讀模式 · 編輯需授權</div>
    </div>

    <!-- 閱讀器畫面 (view 2) 預設隱藏 -->
    <div id="reader-view" class="view hidden-view">
        <div class="reader-header">
            <div class="back-btn" id="back-to-shelf">⏎</div>
            <div class="reader-title-area">
                <div class="reader-title" id="reader-story-title">《才能專校》</div>
                <div class="reader-author" id="reader-author-line">作者：Yun7044</div>
            </div>
            <!-- 作者工具按鈕（科技鎖） -->
            <div class="author-tool-btn" id="author-tool-btn">⚙️🔓</div>
        </div>

        <!-- 小說內容顯示區 -->
        <div class="reader-content" id="story-content-display">
            （載入中...）
        </div>

        <!-- 編輯面板 (預設隱藏) 只有認證後可顯示 -->
        <div id="edit-panel" class="edit-panel">
            <textarea id="editor-textarea" class="edit-textarea" placeholder="編輯小說內容... 支援多行文字"></textarea>
            <div class="edit-actions">
                <button class="neo-btn magenta" id="logout-author-btn">🚫 鎖定</button>
                <button class="neo-btn" id="save-edit-btn">💾 儲存</button>
                <button class="neo-btn magenta" id="close-panel-btn">✕ 關閉</button>
            </div>
            <div class="footnote">⚠️ 只有通過密碼認證才能編輯，修改後自動儲存於此瀏覽器</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 設定區域 ----------
        // 作者密碼（請自行修改為您的專屬密碼）
        const AUTHOR_PASSWORD = "yun7044";   // <-- 可改成只有自己知道的密碼

        // 預設小說內容 (您可以預先填入真正的內文)
        const DEFAULT_STORY_CONTENT = 
"《才能專校》Yun7044 著";

        // 資料儲存 key (localStorage)
        const STORAGE_KEY = 'caineng_novel_content';

        // 全域狀態
        let currentStoryId = 'caineng';          // 目前只有一部作品
        let stories = {
            caineng: {
                id: 'caineng',
                title: '《才能專校》',
                author: 'Yun7044',
                content: ''
            }
        };

        // 認證狀態 & 編輯面板可見性
        let authorAuthenticated = false;    // 是否通過密碼驗證 (session)
        let isEditPanelVisible = false;

        // DOM 元素
        const bookcaseView = document.getElementById('bookcase-view');
        const readerView = document.getElementById('reader-view');
        const storyDisplay = document.getElementById('story-content-display');
        const readerTitle = document.getElementById('reader-story-title');
        const readerAuthor = document.getElementById('reader-author-line');
        const backBtn = document.getElementById('back-to-shelf');
        const openStoryBtn = document.getElementById('open-story-btn');
        const authorToolBtn = document.getElementById('author-tool-btn');
        const editPanel = document.getElementById('edit-panel');
        const editorTextarea = document.getElementById('editor-textarea');
        const saveEditBtn = document.getElementById('save-edit-btn');
        const closePanelBtn = document.getElementById('close-panel-btn');
        const logoutBtn = document.getElementById('logout-author-btn');

        // ---------- 初始化 / 載入儲存內容 ----------
        function loadStoriesFromStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                stories.caineng.content = saved;
            } else {
                stories.caineng.content = DEFAULT_STORY_CONTENT;
            }
        }
        loadStoriesFromStorage();

        // ---------- 工具函數：儲存至 localStorage ----------
        function persistContent() {
            localStorage.setItem(STORAGE_KEY, stories.caineng.content);
        }

        // ---------- 更新閱讀器顯示內容 (依據 currentStoryId) ----------
        function refreshReaderContent() {
            const story = stories.caineng;  // 只有一個故事
            readerTitle.textContent = story.title;
            readerAuthor.textContent = `作者：${story.author}`;
            storyDisplay.textContent = story.content;
        }

        // ---------- 切換到書架 ----------
        function showBookcase() {
            // 隱藏閱讀畫面，顯示書架
            readerView.classList.add('hidden-view');
            bookcaseView.classList.remove('hidden-view');
            // 重置編輯相關狀態 (離開閱讀器順便鎖住)
            authorAuthenticated = false;
            isEditPanelVisible = false;
            editPanel.classList.remove('show-panel');
        }

        // ---------- 切換到閱讀器 (並顯示特定故事) ----------
        function showReader() {
            bookcaseView.classList.add('hidden-view');
            readerView.classList.remove('hidden-view');
            // 重新確保內容最新
            refreshReaderContent();
            // 每次進入閱讀器，為了安全：強制登出編輯模式
            authorAuthenticated = false;
            isEditPanelVisible = false;
            editPanel.classList.remove('show-panel');
        }

        // ---------- 開啟小說 (從書架點擊) ----------
        function openStory() {
            // 只有一部作品，直接顯示閱讀器
            showReader();
        }

        // ---------- 處理作者工具按鈕 (點擊後驗證or切換面板) ----------
        function handleAuthorTool() {
            if (!authorAuthenticated) {
                // 未驗證：彈出密碼視窗
                const inputPwd = prompt('🔐 請輸入作者密碼以解鎖編輯功能：');
                if (inputPwd === AUTHOR_PASSWORD) {
                    authorAuthenticated = true;
                    // 認證成功後自動開啟編輯面板
                    openEditPanel();
                } else if (inputPwd !== null) {
                    alert('❌ 密碼錯誤，無法編輯。');
                }
                // 若按下取消，不做任何事
            } else {
                // 已驗證：直接切換編輯面板顯示/隱藏
                if (isEditPanelVisible) {
                    closeEditPanel();
                } else {
                    openEditPanel();
                }
            }
        }

        // 開啟編輯面板：填充當前內容、顯示、更新狀態
        function openEditPanel() {
            if (!authorAuthenticated) return; // 防呆

            // 將目前小說內容放入textarea
            editorTextarea.value = stories.caineng.content;
            // 顯示面板
            editPanel.classList.add('show-panel');
            isEditPanelVisible = true;
        }

        // 關閉編輯面板
        function closeEditPanel() {
            editPanel.classList.remove('show-panel');
            isEditPanelVisible = false;
        }

        // 儲存編輯內容
        function saveEditedContent() {
            if (!authorAuthenticated) {
                alert('未經授權，無法儲存。請重新認證。');
                return;
            }
            const newContent = editorTextarea.value;
            if (newContent.trim() === '' && !confirm('內容為空，確定要儲存嗎？')) {
                return;
            }
            // 更新記憶體中的故事內容
            stories.caineng.content = newContent;
            // 更新顯示區
            refreshReaderContent();
            // 儲存到 localStorage
            persistContent();
            // 可選：儲存後不關閉面板，讓作者繼續編輯（符合習慣）
            // 如果想關閉，可以使用 closeEditPanel()，但保持開啟較方便
            // 我們保持開啟，但可以提示儲存完成
            // 輕提示用 alert 有點擾人，改用閃一下視覺（簡單顯示 panel 不變化）
            // 也可以不做任何提示，使用者看到內容改變即成功
            // 順便刷新textarea內容不變
        }

        // 登出（撤銷認證）並關閉面板
        function logoutAuthor() {
            authorAuthenticated = false;
            closeEditPanel();
        }

        // ---------- 事件綁定 ----------
        // 返回書架
        backBtn.addEventListener('click', showBookcase);

        // 開啟小說 (書架上的卡片)
        openStoryBtn.addEventListener('click', openStory);

        // 作者工具按鈕
        authorToolBtn.addEventListener('click', handleAuthorTool);

        // 儲存編輯
        saveEditBtn.addEventListener('click', saveEditedContent);

        // 關閉編輯面板 (不改變認證狀態)
        closePanelBtn.addEventListener('click', closeEditPanel);

        // 登出(鎖定)按鈕
        logoutBtn.addEventListener('click', function() {
            logoutAuthor();
        });

        // 可選：當在閱讀器按下返回時，也重置認證 (但 showBookcase 已有 reset)
        // 為了確保安全，任何返回書架動作都清除認證。已經在 showBookcase 處理。

        // 額外防護：如果讀者透過開發者工具，也無法輕易修改，因為儲存需經過程式。
        // 剛載入時顯示書架，但需確保內容已載入
        // 預設顯示書架，但先refresh一下內容以備用（初始化）
        refreshReaderContent();

        // 如果讀者直接重新整理，停留在書架
        // 一切就緒

        // 增加一個小功能：點擊作者欄位可快速查看密碼提示？（不需要，但友善提醒）
        // 我們在編輯面板下方已有說明

        // 另外，若 localStorage 被清空，重新取得預設
        window.addEventListener('load', function() {
            // 再次確認儲存內容 (防止其他分頁修改? 單頁夠用)
            loadStoriesFromStorage();
            refreshReaderContent();
        });
    })();
</script>
<!-- 備註：作者Yun7044 可透過右下角工具按鈕輸入密碼(yun7044)編輯內容，修改後會儲存在瀏覽器中 -->
</body>
</html>
