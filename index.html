    此時那位學長說道「我的名字叫做『白狼』，是大你們兩個年級的學長，而這位學姐叫做「Rose」，是一位來自國外的人，但她從小到大都是在這個國家長大，所以不用擔心語言的問題。」
結果學長話鋒一轉，並且說道

    「我是來跟你們宣戰的，因為我聽說你們班出現了一位天才，而這一次的園遊會，其中有一班的活動是『智慧搶答賽』，班級在這裡，那位天才，到時候我會來找你的⋯⋯」
學長說完後就丟下一張紙條並帶著學姐離開

      第九篇：園遊會的工作

    在學長學姐走後，我們陷入了一片寂靜，只有緋紅班導說了一些話，「我們不用理會他們，我等一下下課會去處理，畢竟他們上課時間隨意闖入別人的教室。」

    在班導講完這些話後，我們都鬆了一口氣，至於之後怎麼辦，就聽天由命吧，但我們還有一些重要的事情要做，就是園遊會的工作分配，班導似乎也意識到了這件事，他給了我們十分鐘的時間去自己找同伴，至少要三人，於是我趕緊走到冠同學和奇同學的旁邊，我們很快就組成一組了。

    就在這時，有一位班上的同學來找我們，「你…你們還缺人嗎？」，我們都不知道她是誰，只有我在開學的時候稍微記得，她的綽號叫做「黑色」，此時，冠同學突然說「呃，班上還有其他人啊，為什麼偏偏要來找我們？」。

    「因為你們看起來比較親切」，黑色是這麼說的，於是我們就接納了她來我們組，之後猩紅班導給我們分配的工作是「記帳」，這時黑色說，那我們沒問題了，我數學特別好！

——————————————

          第十篇：園遊會

    在兩週後，終於迎來了園遊會，我們所有人都很興奮，除了一個人，那個人叫做「婭」，是我們班最內向的一個人，但這一次緋紅班導卻給她一個「推銷」的工作，所以她有點崩潰，到園遊會之前，她一直說著「我不要出去推銷啊啊啊！」。

    在我們班擺好攤位之後，那兩位學長姐果然沒來找我們，應該是緋紅班導已經處理好了，此時，我們負責櫃檯工作的櫃檯小姐「凜」已經開始接待第一個客人了，由於緋紅班導的「特異功能」，他預測到了今天非常熱，所以我們賣冰。

    凜同學接待完第一個客人之後，我們開始記帳，「蘋果口味冰棒x1、哈蜜瓜口味冰棒x2」，正當我們記完帳之後，有一個熟悉的聲音突然響起。

    「哎呀哎呀！這一班真的很不講信用，說好了要比試呢？結果沒來！」，凜同學第一時間說「不好意思，如果沒有要買東西，請你離開」，而白狼學長直接把凜同學推開⋯⋯

——————————————

     第十一篇：超強班導2

    在白狼學長推倒凜同學後，暗中觀察的班導走了出來，班導說「我就知道這傢伙不老實，看來要好好『教訓』一頓才會老實啊」，說完後班導用挑釁的眼神看向白狼學長。

    「阿對對對，你是老師，我是學生，所以我一定要聽你的是吧？」白狼學長說完後直接往班導的方向要揮出一拳，結果在一瞬間，班導的右眼通紅，在我們還沒反應過來的一瞬間，白狼學長就倒在地上，昏過去了。

    我們所有人都很驚訝，但班導說「不要放鬆警惕！有人暗中觀察我們！」，班導說完後從原地消失，下一秒就拎著Rose學姐出現，我們再次驚訝。

    「妳為什麼要錄影啊！回答我！！」，班導憤怒的吼著，Rose學姐直接被嚇哭了，她說「是白狼威脅我這麼做的」。

    此時，在校長辦公室，白狼學長正在跟校長打小報告⋯⋯，「爺爺！他們這樣太囂張了！」，校長說「沒事，我會『處理』的」

——————————————

 第十二篇：開學後的大危機

    在園遊會結束的一個禮拜後，我們所有人以為緋紅班導解決了學長姐來找碴的事件，但是，令我們萬萬沒想到的是⋯⋯

    「我被降職了，不能再當你們的班導了」，所有人都很驚訝，緋紅老師接著說「因為白狼那傢伙是校長的孫子，白狼之後跑去跟校長告狀了。」，我們所有人都很氣憤。

    「所有人！都坐下！我要跟你們講事情！」，所有人都坐回去自己的座位上，班導緊接著說「我要告訴你們，這個班的真相，以及為什麼會有人像冠同學那樣有『才能』。」
                   
                   （作者：詳情請看第四篇）

    緋紅老師繼續說「其實我們班所有人都有潛力能覺醒『才能』，只是冠同學比較特殊，她的兄弟姐妹其中有一位也有『才能』，就是你們口中的校園女神，大你們一個年級的『𡟺』⋯⋯」

        const DEFAULT_CONTENT_SPECIAL = `預期2026年04月04日更新！\n\n敬請期待！`;

        // ---------- 小說資料結構 ----------
        let stories = {
            caineng: {
                id: 'caineng',
                title: '《才能專校》',
                author: 'Yun7044',
                icon: '📘',           // 第一本用 📘
                content: DEFAULT_CONTENT_MAIN
            },
            special1: {
                id: 'special1',
                title: '《才能專校 特別篇 其一 緋紅回歸之「才能昇華」》',
                author: 'Yun7044',
                icon: '📕',           // 第二本用 📕
                content: DEFAULT_CONTENT_SPECIAL
            }
        };

        // 儲存用的 key (全新，避免與舊資料衝突)
        const STORAGE_KEY = 'novels_data_v2';

        // 當前選中的小說 ID
        let currentStoryId = 'caineng';

        // 認證狀態
        let authorAuthenticated = false;
        let isEditPanelVisible = false;

        // DOM 元素
        const bookcaseView = document.getElementById('bookcase-view');
        const readerView = document.getElementById('reader-view');
        const shelfContainer = document.getElementById('shelf-grid-container');
        const storyDisplay = document.getElementById('story-content-display');
        const readerTitle = document.getElementById('reader-story-title');
        const readerAuthor = document.getElementById('reader-author-line');
        const backBtn = document.getElementById('back-to-shelf');
        const authorToolBtn = document.getElementById('author-tool-btn');
        const editPanel = document.getElementById('edit-panel');
        const editorTextarea = document.getElementById('editor-textarea');
        const saveEditBtn = document.getElementById('save-edit-btn');
        const closePanelBtn = document.getElementById('close-panel-btn');
        const logoutBtn = document.getElementById('logout-author-btn');

        // ---------- 從 localStorage 載入所有小說內容 ----------
        function loadStoriesFromStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // 合併到 stories (只覆蓋內容)
                    for (let id in parsed) {
                        if (stories[id]) {
                            stories[id].content = parsed[id].content || stories[id].content;
                        }
                    }
                } catch (e) {
                    console.warn('解析儲存資料失敗，使用預設內容');
                }
            }
        }
        loadStoriesFromStorage();

        // ---------- 儲存所有小說到 localStorage ----------
        function persistAllStories() {
            const toSave = {};
            for (let id in stories) {
                toSave[id] = {
                    content: stories[id].content
                };
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
        }

        // ---------- 根據 currentStoryId 更新閱讀器顯示 ----------
        function refreshReaderContent() {
            const story = stories[currentStoryId];
            if (story) {
                readerTitle.textContent = story.title;
                readerAuthor.textContent = `作者：${story.author}`;
                storyDisplay.textContent = story.content;
            } else {
                readerTitle.textContent = '未知作品';
                readerAuthor.textContent = '作者：Yun7044';
                storyDisplay.textContent = '內容不存在';
            }
        }

        // ---------- 動態產生書架卡片 ----------
        function renderShelf() {
            shelfContainer.innerHTML = ''; // 清空
            for (let id in stories) {
                const story = stories[id];
                const card = document.createElement('div');
                card.className = 'story-card';
                card.setAttribute('data-story-id', id);
                card.innerHTML = `
                    <span class="story-icon">${story.icon}</span>
                    <span class="story-title">${story.title.replace(/《|》/g, '')}</span>
                    <span class="story-sub">點擊進入 · 作者${story.author}</span>
                `;
                card.addEventListener('click', () => {
                    currentStoryId = id;      // 設定當前選中的小說
                    showReader();              // 切換到閱讀器
                });
                shelfContainer.appendChild(card);
            }
        }

        // ---------- 畫面切換 ----------
        function showBookcase() {
            readerView.classList.add('hidden-view');
            bookcaseView.classList.remove('hidden-view');
            // 重置編輯狀態
            authorAuthenticated = false;
            isEditPanelVisible = false;
            editPanel.classList.remove('show-panel');
        }

        function showReader() {
            bookcaseView.classList.add('hidden-view');
            readerView.classList.remove('hidden-view');
            refreshReaderContent();
            // 每次進入閱讀器強制登出編輯模式
            authorAuthenticated = false;
            isEditPanelVisible = false;
            editPanel.classList.remove('show-panel');
        }

        // ---------- 作者工具按鈕處理 ----------
        function handleAuthorTool() {
            if (!authorAuthenticated) {
                const inputPwd = prompt('🔐 請輸入作者密碼以解鎖編輯功能：');
                if (inputPwd === AUTHOR_PASSWORD) {
                    authorAuthenticated = true;
                    openEditPanel();
                } else if (inputPwd !== null) {
                    alert('❌ 密碼錯誤，無法編輯。');
                }
            } else {
                if (isEditPanelVisible) {
                    closeEditPanel();
                } else {
                    openEditPanel();
                }
            }
        }

        function openEditPanel() {
            if (!authorAuthenticated) return;
            // 將當前小說的內容放入編輯區
            editorTextarea.value = stories[currentStoryId].content;
            editPanel.classList.add('show-panel');
            isEditPanelVisible = true;
        }

        function closeEditPanel() {
            editPanel.classList.remove('show-panel');
            isEditPanelVisible = false;
        }

        function saveEditedContent() {
            if (!authorAuthenticated) {
                alert('未經授權，無法儲存。請重新認證。');
                return;
            }
            const newContent = editorTextarea.value;
            if (newContent.trim() === '' && !confirm('內容為空，確定要儲存嗎？')) {
                return;
            }
            // 更新對應小說的內容
            stories[currentStoryId].content = newContent;
            refreshReaderContent();
            persistAllStories();
        }

        function logoutAuthor() {
            authorAuthenticated = false;
            closeEditPanel();
        }

        // ---------- 事件綁定 ----------
        backBtn.addEventListener('click', showBookcase);
        authorToolBtn.addEventListener('click', handleAuthorTool);
        saveEditBtn.addEventListener('click', saveEditedContent);
        closePanelBtn.addEventListener('click', closeEditPanel);
        logoutBtn.addEventListener('click', logoutAuthor);

        // ---------- 初始化 ----------
        renderShelf();               // 產生書架卡片
        refreshReaderContent();      // 預先刷新閱讀器內容 (雖然目前隱藏)

        // 再次確認儲存內容 (頁面載入完成時)
        window.addEventListener('load', function() {
            loadStoriesFromStorage();
            renderShelf();           // 重新渲染（確保內容最新）
            refreshReaderContent();
        });
    })();
</script>
