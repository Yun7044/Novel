  結果一大群男同學直接衝了上去，裡面還有一些男生說「有機會跟這位校園女神同一個社團，何樂而不為呢！」
    此時，猩紅老師把我叫到一旁⋯⋯

        // 資料儲存 key (localStorage)
        const STORAGE_KEY = 'caineng_novel_content';

        // 全域狀態
        let currentStoryId = 'caineng';          // 目前只有一部作品
        let stories = {
            caineng: {
                id: 'caineng',
                title: '《才能專校》',
                author: 'Yun7044',
                content: ''
            }
        };

        // 認證狀態 & 編輯面板可見性
        let authorAuthenticated = false;    // 是否通過密碼驗證 (session)
        let isEditPanelVisible = false;

        // DOM 元素
        const bookcaseView = document.getElementById('bookcase-view');
        const readerView = document.getElementById('reader-view');
        const storyDisplay = document.getElementById('story-content-display');
        const readerTitle = document.getElementById('reader-story-title');
        const readerAuthor = document.getElementById('reader-author-line');
        const backBtn = document.getElementById('back-to-shelf');
        const openStoryBtn = document.getElementById('open-story-btn');
        const authorToolBtn = document.getElementById('author-tool-btn');
        const editPanel = document.getElementById('edit-panel');
        const editorTextarea = document.getElementById('editor-textarea');
        const saveEditBtn = document.getElementById('save-edit-btn');
        const closePanelBtn = document.getElementById('close-panel-btn');
        const logoutBtn = document.getElementById('logout-author-btn');

        // ---------- 初始化 / 載入儲存內容 ----------
        function loadStoriesFromStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                stories.caineng.content = saved;
            } else {
                stories.caineng.content = DEFAULT_STORY_CONTENT;
            }
        }
        loadStoriesFromStorage();

        // ---------- 工具函數：儲存至 localStorage ----------
        function persistContent() {
            localStorage.setItem(STORAGE_KEY, stories.caineng.content);
        }

        // ---------- 更新閱讀器顯示內容 (依據 currentStoryId) ----------
        function refreshReaderContent() {
            const story = stories.caineng;  // 只有一個故事
            readerTitle.textContent = story.title;
            readerAuthor.textContent = `作者：${story.author}`;
            storyDisplay.textContent = story.content;
        }

        // ---------- 切換到書架 ----------
        function showBookcase() {
            // 隱藏閱讀畫面，顯示書架
            readerView.classList.add('hidden-view');
            bookcaseView.classList.remove('hidden-view');
            // 重置編輯相關狀態 (離開閱讀器順便鎖住)
            authorAuthenticated = false;
            isEditPanelVisible = false;
            editPanel.classList.remove('show-panel');
        }

        // ---------- 切換到閱讀器 (並顯示特定故事) ----------
        function showReader() {
            bookcaseView.classList.add('hidden-view');
            readerView.classList.remove('hidden-view');
            // 重新確保內容最新
            refreshReaderContent();
            // 每次進入閱讀器，為了安全：強制登出編輯模式
            authorAuthenticated = false;
            isEditPanelVisible = false;
            editPanel.classList.remove('show-panel');
        }

        // ---------- 開啟小說 (從書架點擊) ----------
        function openStory() {
            // 只有一部作品，直接顯示閱讀器
            showReader();
        }

        // ---------- 處理作者工具按鈕 (點擊後驗證or切換面板) ----------
        function handleAuthorTool() {
            if (!authorAuthenticated) {
                // 未驗證：彈出密碼視窗
                const inputPwd = prompt('🔐 請輸入作者密碼以解鎖編輯功能：');
                if (inputPwd === AUTHOR_PASSWORD) {
                    authorAuthenticated = true;
                    // 認證成功後自動開啟編輯面板
                    openEditPanel();
                } else if (inputPwd !== null) {
                    alert('❌ 密碼錯誤，無法編輯。');
                }
                // 若按下取消，不做任何事
            } else {
                // 已驗證：直接切換編輯面板顯示/隱藏
                if (isEditPanelVisible) {
                    closeEditPanel();
                } else {
                    openEditPanel();
                }
            }
        }

        // 開啟編輯面板：填充當前內容、顯示、更新狀態
        function openEditPanel() {
            if (!authorAuthenticated) return; // 防呆

            // 將目前小說內容放入textarea
            editorTextarea.value = stories.caineng.content;
            // 顯示面板
            editPanel.classList.add('show-panel');
            isEditPanelVisible = true;
        }

        // 關閉編輯面板
        function closeEditPanel() {
            editPanel.classList.remove('show-panel');
            isEditPanelVisible = false;
        }

        // 儲存編輯內容
        function saveEditedContent() {
            if (!authorAuthenticated) {
                alert('未經授權，無法儲存。請重新認證。');
                return;
            }
            const newContent = editorTextarea.value;
            if (newContent.trim() === '' && !confirm('內容為空，確定要儲存嗎？')) {
                return;
            }
            // 更新記憶體中的故事內容
            stories.caineng.content = newContent;
            // 更新顯示區
            refreshReaderContent();
            // 儲存到 localStorage
            persistContent();
            // 可選：儲存後不關閉面板，讓作者繼續編輯（符合習慣）
            // 如果想關閉，可以使用 closeEditPanel()，但保持開啟較方便
            // 我們保持開啟，但可以提示儲存完成
            // 輕提示用 alert 有點擾人，改用閃一下視覺（簡單顯示 panel 不變化）
            // 也可以不做任何提示，使用者看到內容改變即成功
            // 順便刷新textarea內容不變
        }

        // 登出（撤銷認證）並關閉面板
        function logoutAuthor() {
            authorAuthenticated = false;
            closeEditPanel();
        }

        // ---------- 事件綁定 ----------
        // 返回書架
        backBtn.addEventListener('click', showBookcase);

        // 開啟小說 (書架上的卡片)
        openStoryBtn.addEventListener('click', openStory);

        // 作者工具按鈕
        authorToolBtn.addEventListener('click', handleAuthorTool);

        // 儲存編輯
        saveEditBtn.addEventListener('click', saveEditedContent);

        // 關閉編輯面板 (不改變認證狀態)
        closePanelBtn.addEventListener('click', closeEditPanel);

        // 登出(鎖定)按鈕
        logoutBtn.addEventListener('click', function() {
            logoutAuthor();
        });

        // 可選：當在閱讀器按下返回時，也重置認證 (但 showBookcase 已有 reset)
        // 為了確保安全，任何返回書架動作都清除認證。已經在 showBookcase 處理。

        // 額外防護：如果讀者透過開發者工具，也無法輕易修改，因為儲存需經過程式。
        // 剛載入時顯示書架，但需確保內容已載入
        // 預設顯示書架，但先refresh一下內容以備用（初始化）
        refreshReaderContent();

        // 如果讀者直接重新整理，停留在書架
        // 一切就緒

        // 增加一個小功能：點擊作者欄位可快速查看密碼提示？（不需要，但友善提醒）
        // 我們在編輯面板下方已有說明

        // 另外，若 localStorage 被清空，重新取得預設
        window.addEventListener('load', function() {
            // 再次確認儲存內容 (防止其他分頁修改? 單頁夠用)
            loadStoriesFromStorage();
            refreshReaderContent();
        });
    })();
</script>
